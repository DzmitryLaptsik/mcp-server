services:
  timebook_ai_mcp_server_app:
    image: timebook_ai_server
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timebook_ai_server
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - mcp_network

networks:
  mcp_network:
    driver: bridge
