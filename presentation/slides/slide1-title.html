<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0D1117; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0D1117; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.accent-bar {
  position: absolute; top: 0; left: 0; width: 100%; height: 6pt;
  background: #5EA8A7;
}
.logo-circle {
  width: 100pt; height: 100pt; border-radius: 50%;
  background: #5EA8A7; margin-bottom: 24pt;
  display: flex; align-items: center; justify-content: center;
}
h1 { color: #FFFFFF; font-size: 46pt; margin: 0 0 12pt 0; text-align: center; }
h2 { color: #8B949E; font-size: 24pt; margin: 0 0 8pt 0; font-weight: normal; text-align: center; }
.subtitle { color: #5EA8A7; font-size: 17pt; text-align: center; }
.bottom-bar {
  position: absolute; bottom: 20pt; left: 40pt; right: 40pt;
  display: flex; justify-content: space-between;
}
.bottom-text { color: #484F58; font-size: 12pt; }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="logo-circle">
  <p style="color: #FFFFFF; font-size: 38pt; font-weight: bold; margin: 0;">MCP</p>
</div>
<h1>MCP Assistant</h1>
<h2>Personal Productivity Server</h2>
<p class="subtitle">19+ AI-Callable Tools  |  Multi-Model Chat  |  Per-User Isolation  |  React Frontend</p>
<div class="bottom-bar">
  <p class="bottom-text">Hackathon Project 2026</p>
  <p class="bottom-text">Built with FastMCP + Python + React</p>
</div>
</body>
</html>
